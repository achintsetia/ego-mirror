<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Mirror oval (face) -->
  <ellipse cx="16" cy="12" rx="8" ry="9.5" fill="url(#shine)" stroke="white" stroke-width="1.5" stroke-opacity="0.8"/>
  <!-- Mirror handle -->
  <rect x="14.75" y="21" width="2.5" height="6" rx="1.25" fill="white" fill-opacity="0.7"/>
  <!-- 4-point sparkle star inside mirror -->
  <path d="M16 7 L16.8 11 L21 12 L16.8 13 L16 17 L15.2 13 L11 12 L15.2 11 Z" fill="white" fill-opacity="0.92"/>
</svg>
